services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - api_gateway
    networks:
      - backend

  api_gateway:
    build: ./api-gateway
    expose:
      - "8080"
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8090
      ADMIN_SERVICE_URL: http://admin-service:9000
      BOOKING_SERVICE_URL: http://booking-service:9010
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:9020
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - auth-service
      - admin-service
      - booking-service
    networks:
      - backend
  

  auth-service:
    build: ./auth
    expose:
      - "8090"
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL}
      PORT: 8090
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:5173/google/callback
      ADMIN_EMAILS: clean.wheels.project@gmail.com

  admin-service:
    build: ./admin
    expose:
      - "9000"
    restart: unless-stopped
    environment:
      PORT: 9000
      NODE_ENV: development
      DB_URL: ${DB_URL}
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - postgres
  

  booking-service:
    build: ./booking
    ports:
      - "9010:9010"
    restart: unless-stopped
    environment:
      PORT: 9010
      DB_URL: ${DB_URL}
      NOTIFICATIONS_MS_URL: http://notifications-service:9020



  notifications-service:
    build: ./notification
    expose:
      - "9020"
    restart: unless-stopped
    environment:
      PORT: 9020
      DB_URL: ${DB_URL}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_USER: clean.wheels.project@gmail.com
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      booking-service:
        condition: service_started
      rabbitmq:
        condition: service_started
  

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq2
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: cleanwheels
      RABBITMQ_DEFAULT_PASS: 2020
    expose:
      - "5672"
      - "15672"

  postgres:
    image: postgres:14
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cleanwheels
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  backend:
    driver: bridge

volumes:
  postgres_data: